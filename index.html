<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Icon  -->
    <title>English Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- daisyUI CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Style CSS-->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <!-- Navbar Section Start -->
    <section>
      <div
        class="navbar bg-[#BADEFF]/26 py-4 border-b border-[#C6BDBD] lg:px-20"
      >
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="" class="">
                  <i class="fa-solid fa-circle-question"></i>
                  FAQ
                </a>
              </li>
              <li>
                <a href="" class="">
                  <i class="fa-solid fa-book-open"></i>
                  Learn
                </a>
              </li>
              <li>
                <a href="" class="">
                  <i class="fa-solid fa-arrow-right-from-bracket"></i>
                  Logout
                </a>
              </li>
            </ul>
          </div>
          <a class="flex items-center text-xl">
            <span class="font-semibold leading-7">English</span>
            <img class="w-10 h-10" src="./assets/logo.png" alt="" srcset="" />
            <span class="font_bangla font-semibold">জানালা</span>
          </a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 gap-4">
            <li>
              <a href="" class="btn btn-primary btn-outline">
                <i class="fa-solid fa-circle-question"></i>
                FAQ
              </a>
            </li>
            <li>
              <a href="" class="btn btn-primary btn-outline">
                <i class="fa-solid fa-book-open"></i>
                Learn
              </a>
            </li>
            <li>
              <a href="" class="btn btn-primary btn-outline">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                Logout
              </a>
            </li>
          </ul>
        </div>
      </div>
    </section>
    <!--Navbar Section End -->

    <!-- Banner Section Start -->
    <section>
      <div class="flex flex-col-reverse md:flex-row justify-between items-center mt-5 mb-12 lg:mt-12 lg:mb-20 lg:px-20">
        <div class="p-4 lg:w-[540px] space-y-6">
          <h1 class="text-5xl font-bold text-[#18181B] leading-12"><span class="text-[#00BCFF]">English</span> is Easy!!</h1>
          <p class="font_bangla">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <div class="mt-7">
            <fieldset class="fieldset w-xs space-y-5">       
              <input type="email" class="input" placeholder="Enter Your Name" />

              <input type="password" class="input" placeholder="Password" />

              <button class="btn btn-primary w-32 text-[#E0E7FF]">Get Started</button>
            </fieldset>
          </div>
        </div>
        <div class="">
          <img src="./assets/hero-student.png" alt="" srcset="" />
        </div>
      </div>
    </section>
    <!-- Banner Section End -->

    <script src="./scripts/script.js"></script>
  </body>
</html>
